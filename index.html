<!DOCTYPE html>
<html>
<head>
<title>Pinoy Eats</title>
<link rel="stylesheet" href="style.css">
</head>

<script>
const menuData = {
    main: [
        {name:"Adobo", img:"adobo.jpg", price:150},
        {name:"Sinigang", img:"sinigang.jpg", price:160},
        {name:"Kare-Kare", img:"kare.jpg", price:170},
        {name:"Lechon", img:"lechon.jpg", price:200},
        {name:"Menudo", img:"menudo.jpg", price:140}
    ],
    popular: [
        {name:"Sisig", img:"sisig.jpg", price:150},
        {name:"Pancit", img:"pancit.jpg", price:130},
        {name:"Lumpia", img:"lumpia.jpg", price:120}
    ],
    special: [
        {name:"Leche Flan", img:"leche flan.jpg", price:100},
        {name:"Bibingka", img:"bibingka.jpg", price:90},
        {name:"Puto Bumbong", img:"puto.jpg", price:95}
    ],
    dessert: [
        {name:"Halo-Halo", img:"halo.jpg", price:110},
        {name:"Mais Con Yelo", img:"mais.jpg", price:90},
        {name:"Turon", img:"turon.jpg", price:80},
        {name:"Ube Cake", img:"ube cake.jpg", price:120},
        {name:"Buko Salad", img:"buko salad.jpg", price:100}
    ],
    drinks: [
        {name:"Buko Juice", img:"buko juice.jpg", price:70},
        {name:"Sago't Gulaman", img:"SG.jpg", price:60},
        {name:"Calamansi Juice", img:"Calamansi.png", price:65},
        {name:"Iced Tea", img:"Tea.jpg", price:50},
        {name:"Coffee", img:"coffe.jpg", price:80}
    ]
};

function showCategory(category){
    const container = document.getElementById("menu-items");
    container.innerHTML = "";

    menuData[category].forEach(food => {
        container.innerHTML += `
        <div class="card selectable" onclick="orderNow('${food.name}','${food.img}',${food.price})">
            <img src="${food.img}">
            <div class="card-content">
                <h3>${food.name}</h3>
                <p class="price">₱${food.price}</p>
            </div>
        </div>
        `;
    });

    document.getElementById("menu-title").innerText = category.toUpperCase();

    document.getElementById("menu-items").scrollIntoView({
        behavior: "smooth"
    });
}

function orderNow(name, img, price){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.name === name);

    if(existing){
        existing.qty += 1;
    } else {
        cart.push({
            name: name,
            img: img,
            price: price,
            qty: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();

    alert(name + " added to cart!");
}
</script>

<div class="cart-icon" onclick="goToCart()">
🛒 <span id="cart-count">0</span>
</div>

<script>
function goToCart(){
    window.location.href = "cart.html";
}

function updateCartCount(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const count = document.getElementById("cart-count");
    count.innerText = cart.length;

    const cartIcon = document.querySelector(".cart-icon");
    cartIcon.classList.add("animate");

    setTimeout(() => {
        cartIcon.classList.remove("animate");
    }, 400);
}

updateCartCount();
</script>
